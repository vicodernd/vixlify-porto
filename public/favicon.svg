<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF2D95"/>
    </linearGradient>
  </defs>
  <!-- Gradient border -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#g)"/>
  <!-- Dark inner background (3px inset) -->
  <rect x="5" y="5" width="54" height="54" rx="10" ry="10" fill="#05070f"/>
  <!-- V letter -->
  <text x="32" y="47" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">V</text>
</svg>
